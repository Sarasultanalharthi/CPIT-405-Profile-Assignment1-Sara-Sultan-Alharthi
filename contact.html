<!DOCTYPE html>
<html lang="en">
<head>

</head>

<body>

<header>
  <div style="display:flex; justify-content:space-between; align-items:center; padding:15px 30px; background:white;">
    
    <div style="display:flex; align-items:center; gap:12px;">
      <img src="images/profile.jpg" alt="Profile" style="width:55px; height:55px; border-radius:50%; object-fit:cover;">
      <span style="font-size:20px; font-weight:600; color:#444;">Sara</span>
    </div>

    <nav style="display:flex; gap:25px;">
      <a href="index.html" style="text-decoration:none; color:#555;">Home</a>
      <a href="schedule.html" style="text-decoration:none; color:#555;">Schedule</a>
      <a href="contact.html" style="text-decoration:none; color:#555;">Contact</a>
    </nav>

  </div>
</header>

<div class="container">

<aside class="sidebar">
</aside>

<main class="content">

<h1>Contact Me</h1>

<form action="http://webhook.site/2f0b349c-764c-45c1-9733-2217758685ad" method="POST">

<label>Name</label>
<input type="text" name="name" required>

<label>Email</label>
<input type="email" name="email">

<label>Message</label>
<textarea name="message" rows="10"></textarea>

<div style="margin-top: 10px; margin-bottom: 20px;">
  <p style="margin-bottom: 10px;"><strong>Message Type</strong></p>

  <div style="display: flex; align-items: center; gap: 25px;">
    <label style="display: flex; align-items: center; gap: 6px; margin: 0;">
      <input type="radio" name="type" value="Inquiry" required style="width: auto; margin: 0;">
      Inquiry
    </label>

    <label style="display: flex; align-items: center; gap: 6px; margin: 0;">
      <input type="radio" name="type" value="Complaint" style="width: auto; margin: 0;">
      Complaint
    </label>
  </div>
</div>

<input type="submit" value="Submit">

</form>

</main>

</div>

  </footer>
